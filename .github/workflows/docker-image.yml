name: Docker Image CI

on:
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建&推送镜像
        run: |
          # 获取release标签版本
          VERSION=${GITHUB_REF#refs/tags/}
          
          # 构建并推送带版本号的镜像
          docker build . --file Dockerfile \
            --tag ghcr.io/z-mio/parse_hub_bot:${VERSION} \
            --tag ghcr.io/z-mio/parse_hub_bot:latest
          
          docker push ghcr.io/z-mio/parse_hub_bot:${VERSION}
          docker push ghcr.io/z-mio/parse_hub_bot:latest